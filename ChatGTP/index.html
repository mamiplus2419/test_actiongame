<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Pixel Jump Adventure</title>
<style>
  body {
    margin: 0;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: monospace;
    color: white;
  }
  canvas {
    border: 4px solid #fff;
    image-rendering: pixelated;
    background: #87CEEB;
  }
</style>
</head>
<body>
<canvas id="gameCanvas" width="480" height="270"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const GRAVITY = 0.5;
const JUMP = -8;
const SPEED = 2;

let keys = {};
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

// プレイヤー
const player = {
  x: 20, y: 200, w: 16, h: 16,
  vx: 0, vy: 0,
  onGround: false
};

// 敵（2種類）
const enemies = [
  {x:150,y:210,w:16,h:16,type:0,dir:1},
  {x:300,y:210,w:16,h:16,type:1,dir:-1}
];

// ステージ
const platforms = [
  {x:0,y:240,w:480,h:30},
  {x:120,y:200,w:80,h:10},
  {x:260,y:180,w:80,h:10}
];

const goal = {x:440,y:200,w:16,h:40};

let misses = 0;
let score = 0;
let gameOver = false;
let clear = false;
let startTime = Date.now();

// 衝突判定
function hit(a,b){
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

// 更新
function update(){
  if(gameOver || clear) return;

  // 移動
  player.vx = 0;
  if(keys["ArrowLeft"]) player.vx = -SPEED;
  if(keys["ArrowRight"]) player.vx = SPEED;

  if(keys["Space"] && player.onGround){
    player.vy = JUMP;
    player.onGround = false;
  }

  player.vy += GRAVITY;
  player.x += player.vx;
  player.y += player.vy;

  player.onGround = false;

  // 足場
  for(let p of platforms){
    if(hit(player,p) && player.vy >= 0){
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  }

  // 落下
  if(player.y > canvas.height){
    miss();
  }

  // 敵
  for(let e of enemies){
    e.x += e.dir * (e.type===0 ? 1 : 2);
    if(e.x < 0 || e.x > canvas.width-16) e.dir *= -1;

    if(hit(player,e)){
      miss();
    }
  }

  // ゴール
  if(hit(player,goal)){
    clear = true;
  }

  score = Math.floor((Date.now()-startTime)/100);
}

// ミス処理
function miss(){
  misses++;
  if(misses >= 3){
    gameOver = true;
  }
  player.x = 20;
  player.y = 200;
  player.vy = 0;
}

// 描画（ドット風）
function drawRect(x,y,w,h,color){
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x),Math.floor(y),w,h);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 背景
  drawRect(0,0,480,270,"#87CEEB");

  // 足場
  for(let p of platforms){
    drawRect(p.x,p.y,p.w,p.h,"#654321");
  }

  // ゴール
  drawRect(goal.x,goal.y,goal.w,goal.h,"#FFD700");

  // プレイヤー（青）
  drawRect(player.x,player.y,player.w,player.h,"#0000FF");

  // 敵
  for(let e of enemies){
    drawRect(e.x,e.y,e.w,e.h, e.type===0 ? "#FF0000" : "#00AA00");
  }

  // UI
  ctx.fillStyle = "white";
  ctx.fillText("MISS: " + misses + "/3", 10, 20);
  ctx.fillText("TIME: " + score, 10, 35);

  if(gameOver){
    ctx.fillText("GAME OVER",180,130);
  }
  if(clear){
    ctx.fillText("CLEAR!",200,130);
  }
}

// ループ
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
