<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>DOT RUNNER - Simple 2D Action</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            background-color: #5C94FC;
            /* FC風の空色 */
        }

        .ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            font-size: 18px;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
